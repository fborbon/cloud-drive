name: Deploy Cloud Drive

on:
  push:
    branches: [main]

jobs:
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H 54.78.82.101 >> ~/.ssh/known_hosts

      - name: Sync code
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy.pem" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude "venv/" \
            --exclude ".venv/" \
            --exclude "*.egg-info/" \
            --exclude "backup.log" \
            --exclude "folders.txt" \
            --exclude ".git/" \
            ./ ubuntu@54.78.82.101:/home/ubuntu/cloud-drive/

      - name: Install deps and restart services
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@54.78.82.101 bash <<'EOF'
            set -e
            if ! command -v ffmpeg &>/dev/null; then
              sudo apt-get install -y -qq ffmpeg
            fi
            cd ~/cloud-drive
            if [[ ! -d venv ]]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install --quiet --upgrade pip
            pip install --quiet boto3 pyyaml streamlit pandas pillow flask
            python3 deploy/pwa/generate_icons.py
            sudo cp deploy/nginx-drive.conf /etc/nginx/sites-available/drive.conf
            sudo ln -sf /etc/nginx/sites-available/drive.conf /etc/nginx/sites-enabled/drive.conf
            sudo nginx -t && sudo systemctl reload nginx
            sudo systemctl daemon-reload
            sudo systemctl enable cloud-drive-web cloud-drive-api
            sudo systemctl restart cloud-drive-web cloud-drive-api
            sleep 4
            sudo systemctl is-active cloud-drive-web
            sudo systemctl is-active cloud-drive-api
            curl -sf http://localhost:8505/_stcore/health > /dev/null && echo "Health: OK"
          EOF

  update-landing:
    name: Update landing page
    runs-on: ubuntu-latest
    needs: deploy-ec2
    steps:
      - uses: actions/checkout@v4

      - name: Checkout landing repo
        uses: actions/checkout@v4
        with:
          repository: fborbon/forwardforecasting-landing
          token: ${{ secrets.GH_PAT }}
          path: landing

      - name: Write landing page
        run: |
          mkdir -p landing/cloud-drive
          cp deploy/landing/index.html landing/cloud-drive/index.html

      - name: Commit and push
        run: |
          cd landing
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud-drive/
          if git diff --cached --quiet; then
            echo "No landing page changes."
          else
            git commit -m "chore: sync cloud-drive landing page"
            git push
          fi
