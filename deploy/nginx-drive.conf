server {
    listen 80;
    server_name drive.forwardforecasting.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name drive.forwardforecasting.eu;

    ssl_certificate     /etc/letsencrypt/live/drive.forwardforecasting.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drive.forwardforecasting.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic           "Cloud Drive";
    auth_basic_user_file /etc/nginx/.htpasswd_drive;

    location /cloud-api/ {
        auth_basic off;
        proxy_pass         http://127.0.0.1:8506/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass         http://127.0.0.1:8505;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
