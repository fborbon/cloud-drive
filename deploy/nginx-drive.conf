server {
    listen 80;
    server_name drive.forwardforecasting.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name drive.forwardforecasting.eu;

    ssl_certificate     /etc/letsencrypt/live/drive.forwardforecasting.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drive.forwardforecasting.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Cookie auth check (internal) ─────────────────────────────────────────
    location = /_auth {
        internal;
        proxy_pass              http://127.0.0.1:8506/auth;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # ── Login / logout (public) ──────────────────────────────────────────────
    location ~ ^/cloud-api/(login|logout)$ {
        proxy_pass         http://127.0.0.1:8506/$1;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Flask API (public — presigned URLs carry their own auth) ─────────────
    location /cloud-api/ {
        proxy_pass             http://127.0.0.1:8506/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_read_timeout     300s;
        proxy_buffering        off;
    }

    # ── PWA assets (public — required for install prompt) ────────────────────
    location = /manifest.json {
        alias /home/ubuntu/cloud-drive/deploy/pwa/manifest.json;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sw.js {
        alias /home/ubuntu/cloud-drive/deploy/pwa/sw.js;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location /pwa/ {
        alias /home/ubuntu/cloud-drive/deploy/pwa/;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Streamlit app (cookie-protected) ─────────────────────────────────────
    location / {
        auth_request /_auth;
        error_page 401 = /cloud-api/login;

        proxy_pass         http://127.0.0.1:8505;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
